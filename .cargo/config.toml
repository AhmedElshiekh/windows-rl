# إعدادات المترجم والربط لبيئة Linux ARM64
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = [
    "-C", "panic=abort",
    "-C", "target-feature=-crt-static",
    # حذفنا fuse-ld=gold مؤقتاً لضمان التوافق العالي
    "-C", "link-arg=-march=armv8-a", 
    #"-C", "link-arg=-fuse-ld=gold",
]


[build]
# تحديد الهدف الافتراضي ليكون Linux ARM64 دائماً
target = "aarch64-unknown-linux-gnu"

[env]
# إخبار Cargo بعدم استخدام التجميع التراكمي في مجلدات أندرويد لتجنب أخطاء الـ Locking
CARGO_INCREMENTAL = "0"
# توجيه الملفات المؤقتة لمسار يدعم صلاحيات التنفيذ (Execution)
CARGO_TARGET_DIR = "/tmp/cargo_target"
